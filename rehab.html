<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>復健師系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    :root{
      --bg:#f4f8fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:rgba(17,24,39,.08);
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow-hover:0 16px 34px rgba(15,23,42,.12);
      --brand-1:#14532d;
      --brand-2:#1f7a5b;
      --accent:#dcfce7;
    }
    body{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.92), transparent 28%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      font-family:"Noto Sans TC", sans-serif;
      color:var(--text);
    }
    .header-bar{
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color:#fff;
      min-height: 92px;
      padding: 18px 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      box-shadow: 0 8px 24px rgba(0,0,0,.14);
    }
    .header-bar h1{
      margin:0;
      font-weight:900;
      font-size:clamp(1.4rem, 2.1vw, 2rem);
      letter-spacing:.06em;
      text-shadow: 0 1px 2px rgba(0,0,0,.18);
    }
    .header-right{
      position:absolute;
      right:22px;
      top:50%;
      transform: translateY(-50%);
      min-width: 220px;
      max-width: 320px;
      padding:10px 12px;
      border-radius:16px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .login-chip-label{
      font-size:.74rem;
      opacity:.86;
      letter-spacing:.08em;
      margin-bottom:4px;
    }
    .login-chip-user{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .login-chip-main{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .login-chip-icon{
      width:36px;
      height:36px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.15);
      flex:0 0 auto;
    }
    .login-chip-text{
      min-width:0;
      line-height:1.2;
    }
    .login-chip-id{
      font-weight:800;
      font-size:.96rem;
      white-space:nowrap;
    }
    .login-chip-name{
      font-size:.82rem;
      opacity:.95;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:160px;
    }
    #logoutBtnRehab{
      margin:0 !important;
      border-color: rgba(255,255,255,.35);
      color:#fff;
      font-weight:700;
      padding:.28rem .65rem;
      border-radius:999px;
    }
    #logoutBtnRehab:hover{
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.5);
      color:#fff;
    }
    @media (max-width: 768px){
      .header-bar{
        min-height:auto;
        padding:16px 14px 14px;
        flex-direction:column;
        gap:12px;
      }
      .header-right{
        position:static;
        transform:none;
        width:min(100%, 420px);
        max-width:100%;
      }
      .login-chip-name{ max-width:unset; }
    }
    .wrap{ max-width:1140px; margin:30px auto; padding:0 18px; }

    .menu-grid{
      display:grid; gap:20px; justify-content:center;
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 991px){ .menu-grid{ grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 576px){ .menu-grid{ grid-template-columns: repeat(1, 1fr);} }

    .menu-item{
      text-decoration:none;
      background:#fff;
      color:#222;
      border-radius:20px;
      text-align:center;
      padding: 26px 14px;
      font-weight:700;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      border:1px solid rgba(0,0,0,.06);
      transition: transform .15s ease, box-shadow .15s ease;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height: 155px;
    }
    .menu-item:hover{ transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,.14); }
    .menu-item i{ font-size:2.4rem; margin-bottom: 12px; color:#166534; }
    .menu-desc{ margin-top: 6px; font-size:.9rem; color:#666; font-weight:500; line-height:1.35; }

    .card-login{ background:#fff; border-radius:18px; box-shadow: 0 2px 10px rgba(0,0,0,.10); border:1px solid rgba(0,0,0,.06); }
    footer{ text-align:center; padding: 22px 0; font-size:.9rem; color:#888; }
  </style>
</head>
<body>
  <div class="header-bar">
    <h1>復健師系統</h1>

    <div id="loginInfoRehab" class="header-right d-none">
      <div class="login-chip-label">目前登入者</div>
      <div class="login-chip-user">
        <div class="login-chip-main">
          <div class="login-chip-icon"><i class="fas fa-person-walking"></i></div>
          <div class="login-chip-text">
            <div class="login-chip-id" id="loginStaffId-rehab"></div>
            <div class="login-chip-name" id="loginStaffName-rehab"></div>
          </div>
        </div>
        <button id="logoutBtnRehab" class="btn btn-sm btn-outline-light">登出</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="login-section-rehab" class="card-login p-4" style="max-width: 720px; margin: 0 auto;">
      <h5 class="fw-bold mb-3">請輸入個人帳號密碼</h5>

      <div class="row g-2 mb-2">
        <div class="col-md-6">
          <input type="text" id="usernameInput-rehab" class="form-control" placeholder="帳號（員工編號）" autocomplete="username">
        </div>
        <div class="col-md-6">
          <input type="password" id="passwordInput-rehab" class="form-control" placeholder="密碼" autocomplete="current-password">
        </div>
      </div>

      <div class="d-flex gap-2 mb-3">
        <button id="loginButton-rehab" class="btn btn-success">
          <i class="fas fa-right-to-bracket me-1"></i>登入
        </button>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="privacyCheck-rehab">
        <label class="form-check-label" for="privacyCheck-rehab">
          我同意 <a href="../privacy-policy.html" target="_blank">《安泰醫療社團法人附設安泰護理之家服務系統使用協議》</a>
        </label>
      </div>

      <div id="errorMessage-rehab" class="text-danger d-none">登入失敗，請確認帳號/密碼與權限設定。</div>

      <div class="text-muted small">
        ※ 若尚未建立帳號請告知管理員。
      </div>

      <div class="mt-3 d-flex gap-2 flex-wrap">
        <a class="btn btn-sm btn-outline-secondary" href="../affairs.html">
          <i class="fas fa-arrow-left me-2"></i>返回事務系統
        </a>
        <a class="btn btn-sm btn-outline-secondary" href="../index.html">
          <i class="fas fa-home me-2"></i>返回首頁
        </a>
      </div>
    </div>

    <div id="dashboard-section-rehab" class="d-none">
      <div class="menu-grid">
        <a href="rehab-records.html" class="menu-item">
          <i class="fas fa-notes-medical"></i>
          <div>復健紀錄系統</div>
        </a>

        <a href="rehab-training.html" class="menu-item">
          <i class="fas fa-dumbbell"></i>
          <div>復健訓練系統</div>
        </a>

        <a href="rehab-evaluation.html" class="menu-item">
          <i class="fas fa-clipboard-check"></i>
          <div>功能評估系統</div>
        </a>

        <a href="affairs.html" class="menu-item">
          <i class="fas fa-arrow-left"></i>
          <div>返回事務系統</div>
          <div class="menu-desc">回到事務系統儀表板</div>
        </a>
      </div>

      <div class="text-center mt-4">
        <a class="btn btn-outline-secondary" href="../index.html">
          <i class="fas fa-home me-2"></i>返回首頁
        </a>
      </div>
    </div>
  </div>

  <footer>© 2025 Copyright. All Rights Reserved.</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-init.js"></script>
  <script src="account-admin.js"></script>
  <script src="rehab.js"></script>
</body>
</html>
