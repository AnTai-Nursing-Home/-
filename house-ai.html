<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House AI Widget</title>
<style>
:root{
  --hai-primary:#ffb15c;
  --hai-primary-strong:#ff8a3d;
  --hai-surface:#fffaf3;
  --hai-border:#ffd8a6;
  --hai-shadow:0 20px 40px rgba(0,0,0,.15);
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
}
.house-ai-widget{
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:99999;
}
.house-ai-button{
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,var(--hai-primary),var(--hai-primary-strong));
  box-shadow:0 10px 30px rgba(255,150,80,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:white;
}
.house-ai-chat{
  width:360px;
  height:520px;
  background:var(--hai-surface);
  border-radius:20px;
  box-shadow:var(--hai-shadow);
  position:absolute;
  bottom:80px;
  right:0;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
.house-ai-header{
  background:linear-gradient(135deg,var(--hai-primary),var(--hai-primary-strong));
  color:white;
  padding:14px 16px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.house-ai-messages{
  flex:1;
  padding:14px;
  overflow:auto;
  font-size:14px;
}
.house-ai-msg{margin-bottom:10px;}
.ai{
  background:#fff;
  border:1px solid var(--hai-border);
  padding:10px 12px;
  border-radius:12px;
}
.user{
  background:var(--hai-primary);
  color:white;
  padding:10px 12px;
  border-radius:12px;
  text-align:right;
}
.house-ai-input-area{
  border-top:1px solid #ffe0b6;
  display:flex;
}
.house-ai-input{
  flex:1;
  border:none;
  padding:12px;
  outline:none;
}
.house-ai-send{
  border:none;
  padding:0 16px;
  background:var(--hai-primary-strong);
  color:white;
  cursor:pointer;
}
@media (max-width: 520px){
  .house-ai-widget{ right:12px; bottom:12px; }
  .house-ai-chat{ width:min(360px, calc(100vw - 24px)); height:min(520px, calc(100vh - 110px)); }
}
</style>
</head>
<body>
<div class="house-ai-widget">
  <div class="house-ai-chat" id="houseAIChat">
    <div class="house-ai-header">
      House AI
      <button onclick="houseAIClose()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer">×</button>
    </div>

    <div class="house-ai-messages" id="houseAIMessages">
      <div class="house-ai-msg ai">
        您好，我是 House AI。<br>
        我可以協助查詢住民資料與生成護理紀錄。
      </div>
    </div>

    <div class="house-ai-input-area">
      <input class="house-ai-input" id="houseAIInput" placeholder="輸入問題..." />
      <button class="house-ai-send" onclick="houseAISend()">送出</button>
    </div>
  </div>

  <button class="house-ai-button" onclick="houseAIToggle()" aria-label="開啟 House AI">🧡</button>
</div>

<script src="house-ai.js"></script>
</body>
</html>
