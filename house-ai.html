<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House AI Widget</title>
<style>
:root{
  --hai-primary:#ffb15c;
  --hai-primary-strong:#ff8a3d;
  --hai-surface:#fffaf3;
  --hai-border:#ffd8a6;
  --hai-shadow:0 20px 40px rgba(0,0,0,.15);
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
}
.house-ai-widget{
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:99999;
}
.house-ai-button{
  width:64px;
  height:64px;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.house-ai-orb{
  width:58px;
  height:58px;
  border-radius:50%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 30% 28%, #fff7df 0%, #ffd38a 28%, #ffb15c 58%, #ff8a3d 100%);
  box-shadow:
    0 0 10px rgba(255,196,120,.95),
    0 0 24px rgba(255,145,77,.65),
    0 0 40px rgba(255,145,77,.35),
    inset 0 0 10px rgba(255,255,255,.75);
  animation:house-ai-breathe 3s ease-in-out infinite;
  transition:transform .2s ease, box-shadow .2s ease;
}
.house-ai-button:hover .house-ai-orb{
  transform:scale(1.08);
  box-shadow:
    0 0 14px rgba(255,196,120,1),
    0 0 30px rgba(255,145,77,.8),
    0 0 46px rgba(255,145,77,.45),
    inset 0 0 12px rgba(255,255,255,.85);
}
.house-ai-orb::before{
  content:"";
  position:absolute;
  top:8px;
  left:13px;
  width:16px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.72);
  filter:blur(1px);
}
.house-ai-plus{
  position:absolute;
  top:7px;
  left:7px;
  font-size:13px;
  font-weight:700;
  color:#fff7ea;
  text-shadow:0 0 8px rgba(255,255,255,.65);
  line-height:1;
}
.house-ai-heart{
  position:absolute;
  right:9px;
  bottom:9px;
  font-size:11px;
  color:#fff1d6;
  text-shadow:0 0 8px rgba(255,255,255,.55);
  line-height:1;
}
.orb-face{
  position:absolute;
  inset:0;
}
.orb-eye{
  position:absolute;
  top:24px;
  width:6px;
  height:6px;
  background:#6a3716;
  border-radius:50%;
}
.orb-eye.left{
  left:18px;
}
.orb-eye.right{
  right:18px;
}
.orb-smile{
  position:absolute;
  left:50%;
  bottom:14px;
  width:14px;
  height:7px;
  transform:translateX(-50%);
  border:2px solid #6a3716;
  border-top:none;
  border-left-color:transparent;
  border-right-color:transparent;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}
.house-ai-chat{
  width:360px;
  height:520px;
  background:var(--hai-surface);
  border-radius:20px;
  box-shadow:var(--hai-shadow);
  position:absolute;
  bottom:80px;
  right:0;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
.house-ai-header{
  background:linear-gradient(135deg,var(--hai-primary),var(--hai-primary-strong));
  color:white;
  padding:14px 16px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.house-ai-messages{
  flex:1;
  padding:14px;
  overflow:auto;
  font-size:14px;
}
.house-ai-msg{margin-bottom:10px;}
.ai{
  background:#fff;
  border:1px solid var(--hai-border);
  padding:10px 12px;
  border-radius:12px;
}
.user{
  background:var(--hai-primary);
  color:white;
  padding:10px 12px;
  border-radius:12px;
  text-align:right;
}
.house-ai-input-area{
  border-top:1px solid #ffe0b6;
  display:flex;
}
.house-ai-input{
  flex:1;
  border:none;
  padding:12px;
  outline:none;
}
.house-ai-send{
  border:none;
  padding:0 16px;
  background:var(--hai-primary-strong);
  color:white;
  cursor:pointer;
}
@keyframes house-ai-breathe{
  0%{transform:scale(1);}
  50%{transform:scale(1.06);}
  100%{transform:scale(1);}
}
@media (max-width: 520px){
  .house-ai-widget{ right:12px; bottom:12px; }
  .house-ai-chat{ width:min(360px, calc(100vw - 24px)); height:min(520px, calc(100vh - 110px)); }
}
</style>
</head>
<body>
<div class="house-ai-widget">
  <div class="house-ai-chat" id="houseAIChat">
    <div class="house-ai-header">
      House AI
      <button onclick="houseAIClose()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer">×</button>
    </div>

    <div class="house-ai-messages" id="houseAIMessages">
      <div class="house-ai-msg ai">
        您好，我是 House AI。<br>
        我可以協助查詢住民資料與生成護理紀錄。
      </div>
    </div>

    <div class="house-ai-input-area">
      <input class="house-ai-input" id="houseAIInput" placeholder="輸入問題..." />
      <button class="house-ai-send" onclick="houseAISend()">送出</button>
    </div>
  </div>

  <button class="house-ai-button" onclick="houseAIToggle()" aria-label="開啟 House AI">
    <div class="house-ai-orb">
      <span class="house-ai-plus">＋</span>
      <div class="orb-face">
        <span class="orb-eye left"></span>
        <span class="orb-eye right"></span>
        <span class="orb-smile"></span>
      </div>
      <span class="house-ai-heart">❤</span>
    </div>
  </button>
</div>

<script src="house-ai.js"></script>
</body>
</html>
