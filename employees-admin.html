<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工資料管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>

:root{
  --page-max: min(100vw, 2400px);
  --panel-bg: rgba(255,255,255,.92);
  --border-soft: rgba(15, 23, 42, .08);
  --shadow-soft: 0 18px 50px rgba(15, 23, 42, .10);
  --shadow-card: 0 10px 26px rgba(15, 23, 42, .08);
  --radius-xl: 24px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  color:#1f2937;
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 28%),
    radial-gradient(circle at top right, rgba(16,185,129,.10), transparent 24%),
    linear-gradient(180deg, #eef4ff 0%, #f7f9fc 34%, #eef3f8 100%);
}
.page-shell{
  width:var(--page-max);
  max-width:100%;
  margin:0 auto;
  padding:24px 18px 28px;
}
@media (min-width: 1400px){
  .page-shell{padding:28px 24px 32px;}
}
@media (min-width: 1800px){
  .page-shell{padding:32px 28px 36px;}
}
.modal-xxl{max-width:min(98vw, 1800px)}
.card{
  border:1px solid var(--border-soft);
  border-radius:var(--radius-xl);
  overflow:hidden;
  background:var(--panel-bg);
  backdrop-filter: blur(10px);
  box-shadow:var(--shadow-soft);
}
.card-header{
  padding:20px 22px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(135deg, #111827 0%, #1f2937 52%, #334155 100%);
  color:#fff;
}
.card-header strong{font-size:1.25rem;letter-spacing:.02em}
.card-header small{font-size:.92rem}
.card-header .btn{
  color:#fff;
  border-color:rgba(255,255,255,.22);
  background:rgba(255,255,255,.06);
  border-radius:999px;
  padding:.5rem .9rem;
}
.card-header .btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.40)}
.card-header .btn-success{background:linear-gradient(135deg, #16a34a 0%, #22c55e 100%);border-color:transparent}
.card-header .btn-success:hover{background:linear-gradient(135deg, #15803d 0%, #16a34a 100%)}
#loginBadge{
  border:none !important;
  background:rgba(255,255,255,.92) !important;
  box-shadow:0 8px 20px rgba(15,23,42,.18);
  font-size:.92rem;
}
.card-body{padding:20px 22px 18px;background:linear-gradient(180deg, rgba(255,255,255,.88) 0%, rgba(248,250,252,.98) 100%)}
#import-status{border:none;border-radius:16px;box-shadow:var(--shadow-card)}
.nav-tabs{
  gap:10px;
  flex-wrap:wrap;
  padding:4px;
  border-bottom:none;
  margin-bottom:14px;
  background:rgba(15,23,42,.04);
  border:1px solid rgba(15,23,42,.06);
  border-radius:18px;
}
.nav-tabs .nav-link{
  border:none;
  border-radius:14px;
  color:#475569;
  font-weight:700;
  padding:11px 18px;
  transition:all .18s ease;
}
.nav-tabs .nav-link:hover{
  color:#0f172a;
  background:rgba(255,255,255,.7);
}
.nav-tabs .nav-link.active{
  color:#0f172a;
  background:#fff;
  box-shadow:0 10px 22px rgba(15,23,42,.09);
}
#tables-wrap{
  height:calc(100vh - 242px);
  min-height:680px;
  max-height:calc(100vh - 242px);
  margin-top:8px;
  overflow:auto;
  position:relative;
  border:1px solid rgba(15,23,42,.08);
  border-radius:20px;
  background:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 10px 26px rgba(15,23,42,.05);
}
@media (max-width: 1199px){
  #tables-wrap{height:calc(100vh - 270px);max-height:calc(100vh - 270px);min-height:560px;}
}
.tab-content{display:block;position:relative;min-height:auto}
.tab-pane{display:none;min-height:100%;padding:0 0 38px;overflow:auto}
.tab-pane.active,.tab-pane.show{display:block}
.table-responsive{
  width:100%;
  min-height:100%;
  padding:0;
  overflow:auto;
  border-radius:20px;
}
.table{
  width:max-content;
  min-width:100%;
  margin-bottom:0;
  border-collapse:separate;
  border-spacing:0;
}
.table thead th{
  position:sticky;
  top:0;
  z-index:5;
  white-space:nowrap;
  vertical-align:middle;
  padding:14px 12px;
  font-size:.94rem;
  font-weight:800;
  color:#0f172a;
  background:linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
  border-bottom:1px solid rgba(15,23,42,.10);
}
.table tbody td{
  padding:12px 12px;
  font-size:.94rem;
  vertical-align:middle;
  color:#334155;
  background:#fff;
  border-bottom:1px solid rgba(226,232,240,.9);
}
.table tbody tr:nth-child(even) td{background:#fbfdff}
.table-hover tbody tr:hover td{background:#eff6ff}
.table > :not(caption) > * > *{box-shadow:none}
.table .sticky-col-1,.table .sticky-col-2,.table .sticky-col-3{position:sticky;z-index:3;background:inherit;}
.table thead .sticky-col-1,.table thead .sticky-col-2,.table thead .sticky-col-3{z-index:8;background:linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);}
.table tbody .sticky-col-1,.table tbody .sticky-col-2,.table tbody .sticky-col-3{background:#fff;}
.table tbody tr:nth-child(even) .sticky-col-1,.table tbody tr:nth-child(even) .sticky-col-2,.table tbody tr:nth-child(even) .sticky-col-3{background:#fbfdff;}
.table-hover tbody tr:hover .sticky-col-1,.table-hover tbody tr:hover .sticky-col-2,.table-hover tbody tr:hover .sticky-col-3{background:#eff6ff;}
.table .sticky-col-1{left:0;min-width:64px;box-shadow:1px 0 0 rgba(226,232,240,.95);}
.table .sticky-col-2{left:64px;min-width:104px;box-shadow:1px 0 0 rgba(226,232,240,.95);}
.table .sticky-col-3{left:168px;min-width:132px;box-shadow:3px 0 8px rgba(15,23,42,.06);}
.sortable-header{cursor:pointer;user-select:none}
.sortable-header.sort-asc::after{content:"  ▲";font-size:.72em;color:#2563eb}
.sortable-header.sort-desc::after{content:"  ▼";font-size:.72em;color:#2563eb}
.form-section-title{font-weight:700;color:#475569;margin-top:8px}
.form-grid-card{
  border:1px solid rgba(15,23,42,.08);
  border-radius:20px;
  padding:16px 16px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(248,250,252,.92) 100%);
  box-shadow:0 8px 24px rgba(15,23,42,.05);
}
.form-grid-card .section-heading{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  font-size:1rem;
  font-weight:800;
  color:#0f172a;
}
.form-grid-card .section-heading i{color:#2563eb}
.cert-row{
  border:1px solid rgba(15,23,42,.08);
  border-radius:16px;
  padding:12px;
  background:#fff;
  box-shadow:0 6px 18px rgba(15,23,42,.04);
}
.cert-actions{display:flex;gap:8px;flex-wrap:wrap}
.cert-meta{font-size:.84rem;color:#64748b}
.cert-empty{
  border:1px dashed rgba(100,116,139,.45);
  border-radius:16px;
  padding:18px;
  text-align:center;
  color:#64748b;
  background:rgba(248,250,252,.7);
}
.upload-preview-link{font-size:.88rem}
.modal-content{border:none;border-radius:24px;box-shadow:0 24px 70px rgba(15,23,42,.18)}
.modal-header,.modal-footer{border-color:rgba(15,23,42,.08)}
.modal-header{background:linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%)}
.modal-footer{background:#fbfdff}
.site-footer{padding:18px 0 2px;text-align:center;color:#64748b;font-size:.92rem}
#fixed-h-scroll{
  position:sticky;
  bottom:0;
  left:0;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  background:rgba(248,250,252,.96);
  border:1px solid rgba(15,23,42,.08);
  border-top:none;
  border-radius:0 0 16px 16px;
  height:16px;
  z-index:12;
}
#fixed-h-scroll::-webkit-scrollbar{height:12px}
#fixed-h-scroll::-webkit-scrollbar-track{background:#e2e8f0;border-radius:999px}
#fixed-h-scroll::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:999px}
@media print{
  body{background:#fff}
  .page-shell{padding:0}
  .card{box-shadow:none;border:none}
  #fixed-h-scroll{display:none !important}
  #tables-wrap{height:auto;max-height:none;overflow:visible;border:none;box-shadow:none}
  .table thead th{position:static}
}

</style>
</head>
<body>
  <div class="page-shell">
    <div class="card">
      <div class="card-header">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-id-badge"></i>
            <div class="d-flex flex-column">
              <strong>員工資料管理</strong>
              <small class="text-white-50">護理師、外籍照服員、台籍照服員、行政/其他</small>
            </div>
          </div>
          <div class="d-flex gap-2 align-items-center flex-wrap justify-content-end">
            <span id="loginBadge" class="badge rounded-pill bg-light text-dark border px-3 py-2">登入者：—</span>
            <a href="office.html?view=dashboard" class="btn btn-sm btn-outline-light">
              <i class="fa-solid fa-arrow-left me-1"></i> 返回儀表板
            </a>
            <button id="import-excel-btn" class="btn btn-sm btn-outline-light">
              <i class="fa-solid fa-file-arrow-up me-1"></i> 從 Excel 匯入
            </button>
            <input type="file" id="excel-file-input" class="d-none" accept=".xlsx,.xls" />
            <button id="export-word-btn" class="btn btn-sm btn-outline-light">
              <i class="fa-solid fa-file-word me-1"></i> 匯出 Word
            </button>
            <button id="export-excel-btn" class="btn btn-sm btn-outline-light">
              <i class="fa-solid fa-file-excel me-1"></i> 匯出 Excel
            </button>
            <button id="print-btn" class="btn btn-sm btn-outline-light">
              <i class="fa-solid fa-print me-1"></i> 列印
            </button>
            <button id="add-employee-btn" class="btn btn-sm btn-success">
              <i class="fa-solid fa-plus me-1"></i> 新增員工
            </button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div id="import-status" class="alert alert-info d-none" role="alert"></div>

        <ul class="nav nav-tabs align-items-center" id="employeeTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="nurses-tab" data-bs-toggle="tab" data-bs-target="#nurses-panel" type="button" role="tab">護理師</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="foreignCaregivers-tab" data-bs-toggle="tab" data-bs-target="#foreignCaregivers-panel" type="button" role="tab">外籍照服員</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="localCaregivers-tab" data-bs-toggle="tab" data-bs-target="#localCaregivers-panel" type="button" role="tab">台籍照服員</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="adminStaff-tab" data-bs-toggle="tab" data-bs-target="#adminStaff-panel" type="button" role="tab">行政/其他</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="inactiveEmployees-tab" data-bs-toggle="tab" data-bs-target="#inactiveEmployees-panel" type="button" role="tab">離職員工</button>
          </li>
        </ul>

        <div class="tab-content" id="tables-wrap"></div>
        <div id="fixed-h-scroll"><div id="scroll-proxy"></div></div></div>

        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="employee-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xxl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="employee-modal-title">新增員工</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          
<form id="employee-form">
  <input type="hidden" id="employee-type">

  <div class="row g-3">
    <div class="col-12">
      <div class="form-grid-card">
        <div class="section-heading"><i class="fa-solid fa-id-card"></i><span>基本資料</span></div>
        <div class="row g-3">
          <div class="col-6 col-md-2">
            <label class="form-label">排序</label>
            <input type="number" class="form-control" id="employee-sortOrder" value="999">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">員編</label>
            <input type="text" class="form-control" id="employee-id" required>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">姓名</label>
            <input type="text" class="form-control" id="employee-name" required>
          </div>
          <div class="col-6 col-md-2 d-none" id="employee-englishName-wrap">
            <label class="form-label">英文姓名</label>
            <input type="text" class="form-control" id="employee-englishName">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">性別</label>
            <select id="employee-gender" class="form-select">
              <option value="">—</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">生日</label>
            <input type="date" class="form-control" id="employee-birthday">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label" id="employee-idCard-label">身分證字號</label>
            <input type="text" class="form-control" id="employee-idCard" maxlength="20">
          </div>
          <div class="col-6 col-md-2 d-none" id="employee-arcStart-wrap">
            <label class="form-label">承接日期</label>
            <input type="date" class="form-control" id="employee-arcStart">
          </div>
          <div class="col-6 col-md-2 d-none" id="employee-renewalDate-wrap">
            <label class="form-label">續聘日期</label>
            <input type="date" class="form-control" id="employee-renewalDate">
          </div>
          <div class="col-6 col-md-2 d-none" id="employee-arcExpiry-wrap">
            <label class="form-label">ARC有效期限迄日</label>
            <input type="date" class="form-control" id="employee-arcExpiry">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">到職日</label>
            <input type="date" class="form-control" id="employee-hireDate">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">職稱</label>
            <input type="text" class="form-control" id="employee-title" placeholder="例：護理師/照服員/行政">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">組別</label>
            <select id="employee-groupNo" class="form-select">
              <option value="">—</option>
              <option value="1">1 組</option>
              <option value="2">2 組</option>
            </select>
          </div>
          <div class="col-6 col-md-3 d-none" id="employee-nationality-wrap">
            <label class="form-label">國籍</label>
            <select id="employee-nationality" class="form-select">
              <option value="">—</option>
              <option value="菲律賓">菲律賓</option>
            </select>
          </div>
          <div class="col-6 col-md-3 d-none" id="employee-inactiveDate-wrap">
            <label class="form-label">離職日期</label>
            <input type="date" class="form-control" id="employee-inactiveDate">
          </div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="form-grid-card">
        <div class="section-heading"><i class="fa-solid fa-phone"></i><span>聯絡資料</span></div>
        <div class="row g-3">
          <div class="col-12 col-md-4">
            <label class="form-label">地址</label>
            <input type="text" class="form-control" id="employee-address">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">手機</label>
            <input type="text" class="form-control" id="employee-phone">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">日間電話</label>
            <input type="text" class="form-control" id="employee-daytimePhone">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">緊急聯絡人姓名</label>
            <input type="text" class="form-control" id="employee-emgName">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">緊急聯絡人關係</label>
            <input type="text" class="form-control" id="employee-emgRelation">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">緊急聯絡人電話</label>
            <input type="text" class="form-control" id="employee-emgPhone">
          </div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="form-grid-card">
        <div class="section-heading"><i class="fa-solid fa-certificate"></i><span>證書資料</span></div>
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <div class="cert-meta">可新增多筆證書，每筆可上傳正面與反面。</div>
          <button type="button" class="btn btn-outline-primary btn-sm" id="add-certificate-btn">
            <i class="fa-solid fa-plus me-1"></i>新增證書
          </button>
        </div>
        <div id="certificates-list" class="d-grid gap-3"></div>
      </div>
    </div>

    <div class="col-12">
      <div class="form-grid-card">
        <div class="section-heading"><i class="fa-solid fa-user-graduate"></i><span>其他資料</span></div>
        <div class="row g-3">
          <div class="col-6 col-md-3">
            <label class="form-label">換證日期</label>
            <input type="date" class="form-control" id="employee-licenseRenewDate">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label">學歷</label>
            <input type="text" class="form-control" id="employee-education">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">畢業學校</label>
            <input type="text" class="form-control" id="employee-school">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">畢業證書</label>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <button type="button" class="btn btn-outline-primary btn-sm" id="graduation-certificate-manage-btn">
                <i class="fa-solid fa-image me-1"></i>查看/新增
              </button>
              <span class="cert-meta" id="graduation-certificate-status">尚未上傳</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" id="save-employee-btn" class="btn btn-primary">儲存</button>
        </div>
      </div>
    </div>
  </div>
    
  <div class="modal fade" id="certificate-file-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">證書附件管理</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="certificate-file-modal-meta" class="alert alert-light border mb-3">—</div>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">正面檔案</label>
              <input type="file" class="form-control" id="certificate-front-file" accept="image/*,.pdf">
              <div class="d-flex gap-2 flex-wrap mt-2">
                <button type="button" class="btn btn-outline-danger btn-sm" id="certificate-front-delete-btn">刪除正面圖片</button>
              </div>
              <div class="mt-2" id="certificate-front-link-wrap"></div>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">反面檔案</label>
              <input type="file" class="form-control" id="certificate-back-file" accept="image/*,.pdf">
              <div class="d-flex gap-2 flex-wrap mt-2">
                <button type="button" class="btn btn-outline-danger btn-sm" id="certificate-back-delete-btn">刪除反面圖片</button>
              </div>
              <div class="mt-2" id="certificate-back-link-wrap"></div>
            </div>
          </div>
          <div class="form-text mt-3">上傳後會直接綁定到目前這一筆證書資料。</div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
  </div>


  <div class="modal fade" id="graduation-certificate-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">畢業證書查看／上傳</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
