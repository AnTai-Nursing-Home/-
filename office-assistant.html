<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輔助系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--bg:#f4f6fb;--card:#fff;--line:rgba(15,23,42,.08);--text:#0f172a;--muted:#64748b}
    body{background:var(--bg);color:var(--text)}
    .page-wrap{width:100%;max-width:none;margin:0;padding:18px}
    .topbar-card,.card-soft{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 10px 30px rgba(15,23,42,.05)}
    .section-title{font-size:1.2rem;font-weight:800}
    .helper-muted{color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:#fff}
    .source-box{border:1px solid var(--line);border-radius:16px;padding:14px;background:linear-gradient(180deg,#fff,#fbfdff)}
    .assistant-empty{padding:26px;text-align:center;color:var(--muted)}
    .assistant-modal .modal-content{border-radius:22px;border:none;box-shadow:0 24px 60px rgba(0,0,0,.18)}
    .assistant-modal .modal-header{background:#111827;color:#fff;border-top-left-radius:22px;border-top-right-radius:22px}
    .count-chip{min-width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#111827;color:#fff;font-size:.84rem;padding:0 9px}
    .popup-scroll{max-height:65vh;overflow:auto;padding-right:4px}
    .popup-section{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}
    .popup-section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(180deg,#f8fafc,#fff);border-bottom:1px solid var(--line)}
    .popup-section-body{padding:14px}
    .popup-item{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
    .popup-item + .popup-item{margin-top:10px}
    .popup-tag{display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:6px 10px;border-radius:999px;font-size:.78rem;font-weight:700;color:#fff}
    .tag-reminder{background:#4f46e5}.tag-incident{background:#dc2626}.tag-maintenance{background:#334155}.tag-stay{background:#0f766e}
    .kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .kpi-card{border:1px solid var(--line);border-radius:16px;padding:14px;background:linear-gradient(180deg,#fff,#fafcff)}
    .kpi-label{font-size:.9rem;color:var(--muted);margin-bottom:6px}.kpi-value{font-size:1.7rem;font-weight:800}
    .loading-box{display:flex;align-items:center;justify-content:center;gap:12px;padding:28px;color:var(--muted)}
    .reminder-split{display:grid;grid-template-rows:minmax(0,1fr) minmax(0,1fr);gap:14px;min-height:620px}
    .reminder-pane{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#fafcff);overflow:hidden;display:flex;flex-direction:column}
    .reminder-pane-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);background:#fff}
    .reminder-pane-body{padding:12px;overflow:auto;max-height:270px}
    .popup-two-stack{display:grid;grid-template-rows:minmax(0,1fr) minmax(0,1fr);gap:12px;min-height:520px}
    .popup-subsection{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
    .popup-subsection-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);background:#fbfcff}
    .popup-subsection-body{padding:12px;overflow:auto;max-height:220px}
    .todo-section[hidden]{display:none !important}
    .grid-main-equal{align-items:stretch}
    .full-height-col{display:flex}.full-height-col>.card-soft{width:100%}
    @media (max-width:992px){.kpi-grid{grid-template-columns:1fr}.reminder-split{min-height:auto}.reminder-pane-body{max-height:320px}.popup-two-stack{min-height:auto}.popup-subsection-body{max-height:240px}}
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="topbar-card p-4 mb-4">
      <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between">
        <div>
          <div class="section-title">提醒事項</div>
          <div class="helper-muted">上半部顯示今日提醒，下半部顯示之後日期提醒</div>
        </div>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <span class="pill"><i class="fa-regular fa-user"></i><span id="assistantLoginUser">未登入</span></span>
          <a href="office.html?view=dashboard" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i>返回儀表板
          </a>
          <button class="btn btn-primary" id="btnNewReminder"><i class="fa-solid fa-plus me-1"></i>新增提醒</button>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-4">
          <label class="form-label">篩選</label>
          <select class="form-select" id="filterReminderStatus">
            <option value="all">全部</option>
            <option value="pending" selected>未完成</option>
            <option value="done">已完成</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">排序</label>
          <select class="form-select" id="sortReminder">
            <option value="asc" selected>日期由近到遠</option>
            <option value="desc">日期由遠到近</option>
            <option value="createdDesc">建立時間最新</option>
            <option value="createdAsc">建立時間最舊</option>
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-outline-dark w-100" id="btnRefreshReminder"><i class="fa-solid fa-rotate me-1"></i>重新整理</button>
        </div>
      </div>
    </div>

    <div class="row g-4 grid-main-equal">
      <div class="col-xl-7 full-height-col">
        <div class="card-soft p-4 h-100">
          <div class="reminder-split">
            <div class="reminder-pane">
              <div class="reminder-pane-head"><div class="fw-bold">今日提醒</div><span class="badge text-bg-primary" id="todayReminderCount">0</span></div>
              <div class="reminder-pane-body" id="todayReminderWrap"></div>
            </div>
            <div class="reminder-pane">
              <div class="reminder-pane-head"><div class="fw-bold">之後提醒</div><span class="badge text-bg-secondary" id="futureReminderCount">0</span></div>
              <div class="reminder-pane-body" id="futureReminderWrap"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl-5 full-height-col">
        <div class="card-soft p-4 h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <div class="section-title">待辦提醒來源</div>
              <div class="helper-muted">勾選後，首頁彈窗才會顯示</div>
            </div>
            <button class="btn btn-outline-primary" id="btnPreviewPopup"><i class="fa-regular fa-window-restore me-1"></i>預覽彈窗</button>
          </div>
          <div class="vstack gap-3 mb-4">
            <div class="source-box">
              <div class="form-check form-switch">
                <input class="form-check-input todo-source-toggle" type="checkbox" id="toggleIncident" data-source="incident">
                <label class="form-check-label fw-bold" for="toggleIncident">意外事件未審核提醒</label>
              </div>
              <div class="helper-muted small mt-2">顯示尚未覆核的案件。</div>
              <div class="mt-2"><span class="badge text-bg-danger" id="countIncident">0</span></div>
            </div>
            <div class="source-box">
              <div class="form-check form-switch">
                <input class="form-check-input todo-source-toggle" type="checkbox" id="toggleMaintenance" data-source="maintenance">
                <label class="form-check-label fw-bold" for="toggleMaintenance">器材報修未完成提醒</label>
              </div>
              <div class="helper-muted small mt-2">排除已完成、紀錄、無法修復。</div>
              <div class="mt-2"><span class="badge text-bg-secondary" id="countMaintenance">0</span></div>
            </div>
            <div class="source-box">
              <div class="form-check form-switch">
                <input class="form-check-input todo-source-toggle" type="checkbox" id="toggleStay" data-source="stay">
                <label class="form-check-label fw-bold" for="toggleStay">外宿申請待辦提醒</label>
              </div>
              <div class="helper-muted small mt-2">排除核准、退回、完成、取消等已處理狀態。</div>
              <div class="mt-2"><span class="badge text-bg-success" id="countStay">0</span></div>
            </div>
          </div>
          <div class="section-title mb-3">目前待辦總覽</div>
          <div class="kpi-grid mb-4">
            <div class="kpi-card"><div class="kpi-label">意外事件</div><div class="kpi-value" id="kpiIncident">0</div></div>
            <div class="kpi-card"><div class="kpi-label">器材報修</div><div class="kpi-value" id="kpiMaintenance">0</div></div>
            <div class="kpi-card"><div class="kpi-label">外宿申請</div><div class="kpi-value" id="kpiStay">0</div></div>
          </div>
          <div id="todoPreviewWrap"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade assistant-modal" id="reminderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="reminderModalTitle">新增提醒</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editingReminderId">
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">提醒日期</label><input type="date" class="form-control" id="reminderDate"></div>
            <div class="col-md-4"><label class="form-label">提醒時間</label><input type="time" class="form-control" id="reminderTime"></div>
            <div class="col-md-4"><label class="form-label">優先程度</label>
              <select class="form-select" id="reminderPriority">
                <option value="normal" selected>一般</option><option value="important">重要</option><option value="urgent">緊急</option>
              </select>
            </div>
            <div class="col-12"><label class="form-label">提醒內容</label><textarea class="form-control" id="reminderText" rows="4"></textarea></div>
            <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" id="reminderDone"><label class="form-check-label" for="reminderDone">已完成</label></div></div>
          </div>
          <div class="text-danger small mt-3 d-none" id="reminderError">請輸入完整資料</div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button><button type="button" class="btn btn-primary" id="btnSaveReminder">儲存</button></div>
      </div>
    </div>
  </div>

  <div class="modal fade assistant-modal" id="assistantPopupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-xl-down modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title m-0">今日通知與待辦</h5>
            <div class="small opacity-75">依登入者顯示個人提醒與已啟用的待辦來源</div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="popupLoadingWrap"></div>
          <div class="row g-4" id="popupBodyWrap">
            <div class="col-lg-5">
              <div class="popup-section h-100">
                <div class="popup-section-head"><div><div class="fw-bold">提醒事項</div><div class="small text-muted">左側單獨捲動</div></div><span class="count-chip" id="popupReminderCount">0</span></div>
                <div class="popup-section-body popup-scroll">
                  <div class="popup-two-stack">
                    <div class="popup-subsection"><div class="popup-subsection-head"><div class="fw-bold">今日提醒</div><span class="badge text-bg-primary" id="popupTodayReminderCount">0</span></div><div class="popup-subsection-body" id="popupTodayReminderList"></div></div>
                    <div class="popup-subsection"><div class="popup-subsection-head"><div class="fw-bold">之後提醒</div><span class="badge text-bg-secondary" id="popupFutureReminderCount">0</span></div><div class="popup-subsection-body" id="popupFutureReminderList"></div></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-7">
              <div class="popup-section h-100">
                <div class="popup-section-head"><div><div class="fw-bold">代辦事項</div><div class="small text-muted">右側單獨捲動，且依開關顯示類別</div></div><span class="count-chip" id="popupTodoCount">0</span></div>
                <div class="popup-section-body popup-scroll">
                  <div class="mb-3 todo-section" id="popupSectionIncident"><div class="d-flex justify-content-between align-items-center mb-2"><div class="fw-bold">意外事件</div><span class="badge text-bg-danger" id="popupCountIncident">0</span></div><div id="popupTodoIncident"></div></div>
                  <div class="mb-3 todo-section" id="popupSectionMaintenance"><div class="d-flex justify-content-between align-items-center mb-2"><div class="fw-bold">器材報修</div><span class="badge text-bg-secondary" id="popupCountMaintenance">0</span></div><div id="popupTodoMaintenance"></div></div>
                  <div class="todo-section" id="popupSectionStay"><div class="d-flex justify-content-between align-items-center mb-2"><div class="fw-bold">外宿申請</div><span class="badge text-bg-success" id="popupCountStay">0</span></div><div id="popupTodoStay"></div></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer"><a href="office-assistant.html" class="btn btn-outline-primary">前往輔助系統</a><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button></div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="assistantToastWrap" style="z-index:2000"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-init.js"></script>
  <script src="office-assistant.js"></script>
</body>
</html>
