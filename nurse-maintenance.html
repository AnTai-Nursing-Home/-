<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>護理師端 - 器材報修</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --page-bg:#f3f6fb;
      --card-border:#e7edf5;
      --header-start:#4f8df7;
      --header-end:#355fcb;
      --soft-blue:#eef4ff;
      --soft-green:#eef9f1;
      --soft-gray:#f8fafc;
      --text-main:#243042;
      --shadow-soft:0 14px 40px rgba(53,95,203,.12);
    }
    body{
      background:
        radial-gradient(circle at top right, rgba(79,141,247,.14), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--page-bg) 100%);
      color:var(--text-main);
    }
    th, td { vertical-align: middle; }
    .page-shell{ max-width: 1480px; }
    .maintenance-card{
      border:1px solid var(--card-border);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      background:#fff;
    }
    .maintenance-header{
      background:linear-gradient(135deg, var(--header-start), var(--header-end));
      color:#fff;
      padding:1.25rem 1.5rem;
    }
    .maintenance-header h4{ font-weight:800; letter-spacing:.5px; }
    .maintenance-toolbar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      margin-bottom:1rem;
    }
    .toolbar-title{ font-size:1.08rem; font-weight:800; }
    .toolbar-subtitle{ color:#6b7280; font-size:.92rem; }
    .quick-stat-wrap{ display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:1rem; }
    .quick-stat{
      background:var(--soft-blue);
      border:1px solid #d8e5ff;
      border-radius:18px;
      padding:.75rem 1rem;
      min-width:150px;
    }
    .quick-stat.green{ background:var(--soft-green); border-color:#d6efdc; }
    .quick-stat.gray{ background:var(--soft-gray); border-color:#e6ebf0; }
    .quick-stat .label{ font-size:.82rem; color:#64748b; margin-bottom:.2rem; }
    .quick-stat .value{ font-size:1.15rem; font-weight:800; }
    .login-chip{
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      padding:.45rem .9rem;
      white-space:nowrap;
      backdrop-filter: blur(6px);
    }
    .btn-header-back{
      border-color:rgba(255,255,255,.55);
      color:#fff;
    }
    .btn-header-back:hover{
      background:rgba(255,255,255,.12);
      color:#fff;
      border-color:#fff;
    }
    .table-shell{
      border:1px solid #e8edf3;
      border-radius:22px;
      overflow:hidden;
      background:#fff;
    }
    .table-window{
      max-height:min(68vh, 620px);
      overflow:auto;
      overscroll-behavior:contain;
      scrollbar-gutter:stable both-edges;
    }
    .table-window .table{
      min-width:1280px;
    }
    .table-window thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:#f6f8fc;
      box-shadow:inset 0 -1px 0 #e6ebf2;
    }
    .table thead th{
      background:#f6f8fc;
      border-bottom:1px solid #e6ebf2;
      color:#475569;
      font-size:.9rem;
      white-space:nowrap;
    }
    .table tbody tr:hover{ background:#fbfdff; }
    .badge-status{
      padding:.5rem .8rem;
      border-radius:999px;
      color:#fff;
      font-weight:700;
      font-size:.82rem;
      display:inline-block;
      white-space:nowrap;
    }
    .detail-text{
      max-width:280px;
      white-space:pre-wrap;
      word-break:break-word;
      color:#475569;
    }
    .comment{
      background:#f8fbff;
      border-color:#e2eaf6 !important;
      border-radius:14px !important;
    }
    .comment .text-muted.small{ font-size:.78rem; }
    .comment-input{
      min-height:72px;
      border-radius:14px;
      resize:vertical;
    }
    .modal-content{
      border:none;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 18px 50px rgba(0,0,0,.18);
    }
    .modal-header{
      border-bottom:none;
      padding:1rem 1.25rem;
    }
    .modal-body{ padding:1.25rem; }
    .modal-footer{ border-top:none; padding:0 1.25rem 1.25rem; }
    .form-control, .form-select{
      border-radius:14px;
      min-height:46px;
      border-color:#dbe3ee;
    }
    textarea.form-control{ min-height:110px; }
    .helper-card{
      background:#f8fbff;
      border:1px dashed #d7e4fb;
      border-radius:16px;
      padding:.85rem 1rem;
      color:#64748b;
      font-size:.88rem;
      margin-bottom:1rem;
    }
    .loading-overlay{
      position:fixed;
      inset:0;
      background:rgba(243,246,251,.72);
      backdrop-filter:blur(3px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:3000;
      padding:1rem;
    }
    .loading-overlay.show{ display:flex; }
    .loading-card{
      width:min(92vw, 360px);
      background:#fff;
      border:1px solid #e7edf5;
      border-radius:24px;
      box-shadow:0 16px 40px rgba(41,66,135,.18);
      padding:1.5rem 1.35rem;
      text-align:center;
    }
    .loading-ring{
      width:56px;
      height:56px;
      margin:0 auto .9rem;
      border-radius:50%;
      border:4px solid #dbe7ff;
      border-top-color:#4f8df7;
      animation:spin .9s linear infinite;
    }
    .loading-title{ font-weight:800; font-size:1.05rem; margin-bottom:.25rem; }
    .loading-text{ color:#64748b; white-space:pre-line; }
    @keyframes spin { to { transform:rotate(360deg);} }
    @media (max-width:768px){
      .maintenance-header{ padding:1rem; }
      .maintenance-card{ border-radius:20px; }
      .table-shell{ border-radius:18px; }
      .table-window{ max-height:min(72vh, 560px); }
      .detail-text{ max-width:unset; }
    }
  </style>
</head>

<body>
  <div class="container-fluid my-4 px-3 px-md-4 page-shell">
    <div class="maintenance-card">
      <div class="maintenance-header d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3">
        <div>
          <h4 class="mb-2"><i class="fa-solid fa-screwdriver-wrench me-2"></i>器材報修（護理師端）</h4>
          <div class="small opacity-75">提供護理師快速提報、追蹤維修進度與補充註解。</div>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2 ms-lg-auto">
          <div id="loginUserInfo" class="small text-white login-chip"></div>
          <a href="admin.html?view=dashboard" class="btn btn-sm btn-outline-light btn-header-back">返回護理師儀表板</a>
        </div>
      </div>

      <div class="card-body p-3 p-md-4">
        <div class="quick-stat-wrap">
          <div class="quick-stat">
            <div class="label">目前報修單</div>
            <div class="value" id="stat-total-count">0</div>
          </div>
          <div class="quick-stat green">
            <div class="label">待處理 / 處理中</div>
            <div class="value" id="stat-open-count">0</div>
          </div>
          <div class="quick-stat gray">
            <div class="label">登入提報人</div>
            <div class="value fs-6" id="stat-user-name">—</div>
          </div>
        </div>

        <div class="maintenance-toolbar">
          <div>
            <div class="toolbar-title">報修清單</div>
            <div class="toolbar-subtitle">可查看所有已送出的報修資料與留言紀錄。</div>
          </div>
          <button class="btn btn-success" id="addRequestBtn">
            <i class="fa-solid fa-plus me-1"></i>新增報修單
          </button>
        </div>

        <div class="helper-card">
          床位選單會優先抓取住民系統的床位模板，包含目前空床，這樣報修房間設備時就不會只能選到有住民的床位。
        </div>

        <div class="table-shell">
          <div class="table-responsive table-window">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>分類</th>
                  <th>位置</th>
                  <th>報修物品</th>
                  <th>詳細資訊</th>
                  <th>報修人</th>
                  <th>狀態</th>
                  <th>報修時間</th>
                  <th>備註 / 註解</th>
                </tr>
              </thead>
              <tbody id="maintenanceTableBody">
                <tr><td colspan="8" class="text-center text-muted py-5">讀取中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addRequestModal" tabindex="-1" aria-labelledby="addRequestModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title" id="addRequestModalLabel"><i class="fa-solid fa-plus me-2"></i>新增報修單</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <div class="helper-card mb-3">
              房間床位會依床位模板列出全部床號；若模板尚未同步，系統會自動用預設模板補上。
            </div>
            <div class="mb-3">
              <label class="form-label">分類</label>
              <select id="category" class="form-select">
                <option value="" selected disabled>請選擇分類</option>
                <option value="1F">1F</option>
                <option value="2F">2F</option>
                <option value="3F">3F</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">位置</label>
              <select id="location" class="form-select" disabled>
                <option value="" selected disabled>請先選擇分類</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">報修物品</label>
              <select id="item" class="form-select" disabled>
                <option value="" selected disabled>請先選擇位置</option>
              </select>
              <div class="form-text">*除以上物品外，其餘物品若要修繕請先告知志騰大哥。</div>
            </div>

            <div class="mb-3">
              <label class="form-label">詳細資訊</label>
              <textarea id="detail" class="form-control" placeholder="請輸入詳細資訊（可選填）"></textarea>
            </div>

            <div class="mb-0">
              <label class="form-label">報修人</label>
              <input type="text" id="reporter" class="form-control" placeholder="自動帶入登入者" readonly>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button class="btn btn-success" id="saveRequestBtn">儲存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="globalLoading" class="loading-overlay" aria-hidden="true">
    <div class="loading-card">
      <div class="loading-ring"></div>
      <div class="loading-title">資料處理中</div>
      <div class="loading-text" id="globalLoadingText">請稍候...</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-init.js"></script>
  <script src="idle-timeout.js"></script>
  <script src="nurse-maintenance.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
