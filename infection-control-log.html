<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>感管工作日誌｜辦公室系統</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-init.js"></script>
  <script src="idle-timeout.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <style>
    body { background:#f3f6fb; }
    .pill { border-radius:999px; }
    .list-item:hover { background:#f8fafc; }
    .page-title { font-size: 1.4rem; font-weight: 800; }
    .card-soft { border:0; box-shadow:0 8px 24px rgba(15,23,42,.08); }
    .sticky-tools { position: sticky; top: 10px; z-index: 5; }
    .table-wrap { overflow:auto; border:1px solid #e5e7eb; border-radius:16px; background:#fff; }
    .log-table { min-width: 1480px; font-size: .9rem; }
    .log-table thead th { position: sticky; top: 0; z-index: 2; background:#0f172a; color:#fff; }
    .log-table th, .log-table td { vertical-align: middle; text-align: center; }
    .log-table .cat-cell { background:#f8fafc; font-weight:700; min-width: 130px; }
    .log-table .item-cell { text-align:left; min-width: 280px; background:#fcfcfd; }
    .log-table .date-head { min-width: 66px; }
    .log-table .disabled-day,
    .log-table .disabled-day input,
    .log-table .disabled-day .form-control,
    .log-table .disabled-day .form-check-input { cursor:not-allowed; }
    .log-table .disabled-day { background:#e5e7eb !important; color:#94a3b8; }
    .log-table .enabled-day { background:#fff; }
    .log-table .hours-input,
    .log-table .sign-input { min-width: 70px; border: 0; background: transparent; text-align:center; }
    .log-table .sign-input { min-width: 92px; }
    .section-note { color:#64748b; font-size:.92rem; }
    .meta-grid { display:grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 12px; }
    .meta-chip { border:1px solid #e5e7eb; border-radius:14px; padding:10px 12px; background:#fff; }
    .form-check-inline.big-check { margin-right:1rem; }
    .form-check-inline.big-check .form-check-input { width:1.15rem; height:1.15rem; margin-top:.15rem; }
    @media (max-width: 992px) {
      .meta-grid { grid-template-columns: 1fr 1fr; }
    }
    @media print {
      .no-print { display:none !important; }
      body { background:#fff; }
    }
  </style>
</head>
<body>
<div class="container-fluid px-3 px-lg-4 my-4">
  <div class="card card-soft mb-3">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <div class="page-title">感染管制專責人員工作日誌</div>
          <div class="text-muted">年度 / 月份依政府辦公日曆表自動帶出應顯示日期，並可依班表限制可勾選日期</div>
        </div>
        <span id="loginBadge" class="badge rounded-pill text-bg-light border" style="font-size:0.95rem;">登入者：—</span>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3 no-print">
    <a id="btnDashBack" href="office.html?view=dashboard" class="btn btn-secondary pill">
      <i class="fas fa-arrow-left me-2"></i>返回辦公室儀表板
    </a>
    <div class="d-flex gap-2 align-items-center">
      <label class="text-muted small mb-0">年份篩選</label>
      <select id="yearFilter" class="form-select" style="width:120px;"></select>
      <button id="btnReload" class="btn btn-outline-secondary pill"><i class="fas fa-rotate me-1"></i>重新整理</button>
      <button id="btnNew" class="btn btn-success pill"><i class="fas fa-plus me-2"></i>新增單張</button>
    </div>
  </div>

  <div id="listSection">
    <div class="card card-soft">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="fw-semibold">單張清單</div>
          <div class="text-muted small">可依年份查看已建立的工作日誌</div>
        </div>
        <div id="loadingText" class="text-muted py-4 text-center d-none">讀取中...</div>
        <div id="listEmpty" class="text-muted py-4 text-center d-none">目前沒有資料</div>
        <div id="listBox" class="list-group"></div>
      </div>
    </div>
  </div>

  <div id="editorSection" class="d-none">
    <div class="card card-soft sticky-tools mb-3 no-print">
      <div class="card-body py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <div class="fw-bold" id="editorTitle">感染管制專責人員工作日誌</div>
            <div class="section-note" id="editorSub">—</div>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button id="btnBack" class="btn btn-outline-secondary pill">返回</button>
            <button id="btnUploadSchedule" class="btn btn-outline-info pill"><i class="fas fa-file-excel me-1"></i>匯入專責人員班表</button>
            <input type="file" id="scheduleFileInput" class="d-none" accept=".xlsx,.xls">
            <button id="btnSave" class="btn btn-success pill"><i class="fas fa-floppy-disk me-1"></i>儲存</button>
            <button id="btnExportDocx" class="btn btn-primary pill"><i class="fas fa-file-word me-1"></i>匯出 Word</button>
            <button id="btnDelete" class="btn btn-outline-danger pill">刪除</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-soft mb-3">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-2">
            <label class="form-label">年份</label>
            <select id="logYear" class="form-select"></select>
          </div>
          <div class="col-md-2">
            <label class="form-label">月份</label>
            <select id="logMonth" class="form-select"></select>
          </div>
          <div class="col-md-2">
            <button id="btnBuildMonth" class="btn btn-dark w-100 pill">更新日期欄位</button>
          </div>
          <div class="col-md-3">
            <label class="form-label">專責人員</label>
            <select id="specialistSelect" class="form-select">
              <option value="">請先匯入班表或手動選擇</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">班表來源</label>
            <input id="scheduleSourceText" class="form-control" placeholder="尚未匯入班表" readonly>
          </div>
        </div>

        <div class="meta-grid mt-3">
          <div class="meta-chip">
            <div class="small text-muted">機構名稱</div>
            <div class="fw-semibold">安泰醫療社團法人附設護理之家</div>
          </div>
          <div class="meta-chip">
            <div class="small text-muted">立案床數</div>
            <input id="bedCount" type="number" class="form-control mt-1" value="136" min="0">
          </div>
          <div class="meta-chip">
            <div class="small text-muted mb-2">感染管制</div>
            <div>
              <div class="form-check form-check-inline big-check">
                <input class="form-check-input" type="checkbox" id="isFullTime">
                <label class="form-check-label" for="isFullTime">專責專任</label>
              </div>
            </div>
          </div>
          <div class="meta-chip">
            <div class="small text-muted">每週專責執行業務之時數</div>
            <input id="weeklyHours" type="number" class="form-control mt-1" value="10" min="0" step="0.5">
          </div>
        </div>
      </div>
    </div>

    <div class="card card-soft">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
          <div class="fw-semibold">工作日誌表格</div>
          <div class="section-note">依政府辦公日曆表顯示日期；國定假日、補休日不顯示，補班日會顯示；若已選專責人員，非上班日將自動反灰不可勾選。</div>
        </div>
        <div class="table-wrap">
          <table class="table table-bordered align-middle mb-0 log-table" id="logTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="staffDetectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">偵測班表人員</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-2">依據您丟入的班表偵測到以下人員，請選擇專責人員：</p>
        <div id="detectedStaffList" class="row g-2"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" id="btnConfirmDetectedStaff" class="btn btn-primary">確定套用</button>
      </div>
    </div>
  </div>
</div>

<script src="infection-control-log.js"></script>
</body>
</html>
